version: '3.8'

services:
  # Base de Datos MongoDB Local eliminada del orquestador principal
  # ya que utilizaremos el clúster remoto en MongoDB Atlas.

  auth-service:
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile
    container_name: pethealth-auth-service
    ports:
      - "3001:3001"
    volumes:
      # Montaje de volumen para "Hot Reload" inmediato durante el desarrollo
      - ./apps/auth-service:/app
      # Montaje de la carpeta de paquetes compartidos (Modelos Pydantic)
      - ./packages:/packages
    env_file:
      - .env.development
    # Sobreescribimos el command para forzar la recarga en caliente con uvicorn
    command: uvicorn main:app --host 0.0.0.0 --port 3001 --reload
    networks:
      - pethealth-network

  appointment-service:
    build:
      context: ./apps/appointment-service
      dockerfile: Dockerfile
    container_name: pethealth-appointment-service
    ports:
      - "3002:3002"
    volumes:
      - ./apps/appointment-service:/app
      - ./packages:/packages
    env_file:
      - .env.development
    command: uvicorn main:app --host 0.0.0.0 --port 3002 --reload
    networks:
      - pethealth-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: pethealth-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      # Evitar que el volumen local sobreescriba los binarios de node_modules en Alpine
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_AUTH_URL=http://localhost:3001
      - VITE_API_APPOINTMENTS_URL=http://localhost:3002
    depends_on:
      - auth-service
      - appointment-service
    networks:
      - pethealth-network

networks:
  pethealth-network:
    driver: bridge
